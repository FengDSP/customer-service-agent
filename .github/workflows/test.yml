name: Tests

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if any PR merged since last successful run
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the last successful run time for this workflow
          LAST_RUN=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/test.yml/runs?status=success&per_page=1" \
            --jq '.workflow_runs[0].updated_at // empty' 2>/dev/null || true)

          if [ -z "$LAST_RUN" ]; then
            echo "No previous successful run found, running tests."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if HEAD commit is newer than last successful run
          HEAD_DATE=$(git log -1 --format=%cI)
          if [ "$(date -d "$HEAD_DATE" +%s)" -gt "$(date -d "$LAST_RUN" +%s)" ]; then
            echo "New commits since last run ($LAST_RUN), running tests."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "No new commits since last run ($LAST_RUN), skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  unit-tests:
    needs: check-changes
    if: needs.check-changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest tests/ -v --ignore=tests/test_e2e.py

  e2e-tests:
    needs: check-changes
    if: needs.check-changes.outputs.should_run == 'true' && vars.RUN_E2E == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run e2e tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m pytest tests/test_e2e.py -v

  playwright-tests:
    needs: check-changes
    if: needs.check-changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Install frontend dependencies
        working-directory: src/frontend/web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: src/frontend/web
        run: npx playwright install chromium

      - name: Run Playwright tests
        working-directory: src/frontend/web
        run: npx playwright test
